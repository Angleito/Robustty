services:
  # Main Discord bot for VPS deployment (no cookie extraction)
  robustty:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: robustty-bot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - APIFY_API_KEY=${APIFY_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SEARCH_TIMEOUT=${SEARCH_TIMEOUT:-30}
      - STREAM_TIMEOUT=${STREAM_TIMEOUT:-300}
      - MAX_QUEUE_SIZE=${MAX_QUEUE_SIZE:-100}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      # Platform enable/disable flags
      - YOUTUBE_ENABLED=${YOUTUBE_ENABLED:-true}
      - RUMBLE_ENABLED=${RUMBLE_ENABLED:-true}
      - ODYSEE_ENABLED=${ODYSEE_ENABLED:-true}
      - PEERTUBE_ENABLED=${PEERTUBE_ENABLED:-true}
    volumes:
      # App data persistence (no Brave browser mount for VPS)
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./data:/app/data
      - robustty-cookies:/app/cookies
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python3", "/app/scripts/health-check.py", "basic"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s

  # Redis cache service for VPS
  redis:
    image: redis:7-alpine
    container_name: robustty-redis
    restart: unless-stopped
    volumes:
      - robustty-redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  robustty-cookies:
    driver: local
  robustty-redis-data:
    driver: local