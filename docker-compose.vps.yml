version: '3.8'

services:
  # Main Discord bot optimized for Ubuntu VPS
  robustty:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: robustty-bot
    restart: unless-stopped
    networks:
      - robustty-net
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - APIFY_API_KEY=${APIFY_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SEARCH_TIMEOUT=${SEARCH_TIMEOUT:-30}
      - STREAM_TIMEOUT=${STREAM_TIMEOUT:-300}
      - MAX_QUEUE_SIZE=${MAX_QUEUE_SIZE:-100}
      - REDIS_URL=redis://redis:6379
      # Discord voice connection optimizations
      - DISCORD_VOICE_TIMEOUT=30
      - DISCORD_RECONNECT_TIMEOUT=60
      # VPS-specific optimizations
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount host-synced cookies as read-only
      - /opt/robustty/cookies:/app/cookies:ro
      # App configuration and data
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      - redis
    # Resource limits for VPS
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import discord; print('healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: robustty-redis
    restart: unless-stopped
    networks:
      - robustty-net
    volumes:
      - robustty-redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    # Health check
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Metrics server for monitoring
  metrics:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: robustty-metrics
    restart: unless-stopped
    networks:
      - robustty-net
    environment:
      - PYTHONPATH=/app
    command: python -m src.services.metrics_server
    ports:
      - "127.0.0.1:8080:8080"  # Only expose locally
    depends_on:
      - robustty
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # Optional: Nginx reverse proxy for metrics (with auth)
  nginx:
    image: nginx:alpine
    container_name: robustty-nginx
    restart: unless-stopped
    networks:
      - robustty-net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - metrics
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

networks:
  robustty-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  robustty-redis-data:
    driver: local